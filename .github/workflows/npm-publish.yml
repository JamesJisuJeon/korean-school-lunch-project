# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: korean-school-lunch-project publish

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: npm install
      - run: npm run build

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Check Out
        uses: actions/checkout@v4
      - name: Set Timestamp
        run: echo "TIMESTAMP=$(date +"%Y%m%d%H%M%S")" >> $GITHUB_ENV
      - name: Install
        run: |
          mkdir /root/lunch/main-$TIMESTAMP
          rsync -av --exclude '.git' * /root/lunch/main-$TIMESTAMP
          cd /root/lunch/main-$TIMESTAMP
          npm install
      - name: Set Default
        run: |
          rm -f /root/lunch/default
          ln -s /root/lunch/main-$TIMESTAMP /root/lunch/default
      - name: Start
        run: |
          cd /root/lunch/default
          pm2 stop —name "lunch-prod"
          pm2 start —name "lunch-prod" npm — start