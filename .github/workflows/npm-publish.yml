# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: korean-school-lunch-project publish

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: npm install

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Check Out
        uses: actions/checkout@v4
      - name: Set Timestamp
        run: echo "TIMESTAMP=$(date +"%Y%m%d%H%M%S")" >> $GITHUB_ENV
      - name: Install
        run: |
          mkdir /root/lunch/main-$TIMESTAMP
          rsync -av --exclude '.git' * /root/lunch/main-$TIMESTAMP
          cd /root/lunch/main-$TIMESTAMP
          npm install
      - name: Set .env
        run: |
          cd /root/lunch/main-$TIMESTAMP
          touch .env
          echo "DATABASE_URL=postgresql://postgres:qwer1234@10.10.1.23:5432/postgres" >> .env
          echo "DIRECT_URL=postgresql://postgres:qwer1234@10.10.1.23:5432/postgres" >> .env
          echo "NEXTAUTH_SECRET=8a7ba148-b671-4fcc-88f4-634c37852eb8" >> .env
          echo "NEXTAUTH_URL=https://lunch.uniwiz.click/" >> .env
          echo "AUTH_TRUST_HOST=https://lunch.uniwiz.click/" >> .env
          echo "PORT=3000" >> .env
      - name: Build
        run: |
          cd /root/lunch/main-$TIMESTAMP
          npm run build
      - name: Set Default
        run: |
          rm -f /root/lunch/default
          ln -s /root/lunch/main-$TIMESTAMP /root/lunch/default
      - name: Start
        run: |
          cd /root/lunch/default
          pm2 stop "lunch-prod" || true
          pm2 delete "lunch-prod" || true
          pm2 start npm --name "lunch-prod" -- start